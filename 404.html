<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Not Found | An Nguyen Portfolio</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@700;800&display=swap" rel="stylesheet">
    
    <style>
      :root {
        --color-sky-500: #0ea5e9;
        --color-teal-400: #2dd4bf;
        --color-slate-950: #020617;
        --color-slate-900: #0f172a;
        --color-slate-800: #1e293b;
        --color-slate-400: #94a3b8;
        --color-white: #ffffff;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background-color: var(--color-slate-950);
        color: var(--color-white);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        position: relative;
        background-image: 
          radial-gradient(circle at 50% 50%, rgba(14, 165, 233, 0.15) 0%, transparent 60%),
          linear-gradient(rgba(15, 23, 42, 0.3) 1px, transparent 1px),
          linear-gradient(90deg, rgba(15, 23, 42, 0.3) 1px, transparent 1px);
        background-size: 100% 100%, 24px 24px, 24px 24px;
      }

      /* Glowing background atmosphere blobs */
      .glow-blob {
        position: absolute;
        border-radius: 50%;
        filter: blur(120px);
        opacity: 0.15;
        z-index: 1;
        pointer-events: none;
      }

      .glow-blob-1 {
        top: 20%;
        left: 20%;
        width: 300px;
        height: 300px;
        background: var(--color-sky-500);
      }

      .glow-blob-2 {
        bottom: 20%;
        right: 20%;
        width: 350px;
        height: 350px;
        background: var(--color-teal-400);
      }

      /* Card Container with Glassmorphism */
      .card {
        background: rgba(15, 23, 42, 0.65);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 24px;
        padding: 3rem 2.5rem;
        max-width: 500px;
        width: 90%;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        text-align: center;
        position: relative;
        overflow: hidden;
        z-index: 10;
        animation: card-appear 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }

      .card::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 4px;
        background: linear-gradient(90deg, var(--color-sky-500), var(--color-teal-400));
      }

      @keyframes card-appear {
        from {
          opacity: 0;
          transform: translateY(20px) scale(0.98);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      /* Icon styling */
      .icon-container {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 72px;
        height: 72px;
        border-radius: 18px;
        background: linear-gradient(135deg, rgba(14, 165, 233, 0.15), rgba(45, 212, 191, 0.15));
        border: 1px solid rgba(45, 212, 191, 0.2);
        color: var(--color-teal-400);
        margin-bottom: 1.5rem;
        animation: float 4s ease-in-out infinite;
      }

      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-8px); }
      }

      /* Typography */
      .error-code {
        font-family: 'Outfit', sans-serif;
        font-size: 6rem;
        font-weight: 800;
        line-height: 1;
        background: linear-gradient(135deg, var(--color-sky-500), var(--color-teal-400));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 0.5rem;
        animation: glow 3s ease-in-out infinite;
        letter-spacing: -0.02em;
      }

      @keyframes glow {
        0%, 100% {
          filter: drop-shadow(0 0 15px rgba(14, 165, 233, 0.2));
        }
        50% {
          filter: drop-shadow(0 0 30px rgba(45, 212, 191, 0.4));
        }
      }

      h1 {
        font-family: 'Outfit', sans-serif;
        font-size: 1.75rem;
        font-weight: 700;
        color: var(--color-white);
        margin-bottom: 1rem;
        letter-spacing: -0.01em;
      }

      p {
        color: var(--color-slate-400);
        font-size: 1rem;
        line-height: 1.6;
        margin-bottom: 2rem;
      }

      /* Animated progress bar loader */
      .progress-container {
        width: 100%;
        height: 4px;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 2px;
        margin: 2rem 0 1rem 0;
        overflow: hidden;
        position: relative;
      }

      .progress-bar {
        height: 100%;
        width: 100%;
        background: linear-gradient(90deg, var(--color-sky-500), var(--color-teal-400));
        transform-origin: left;
        animation: shrink 5s linear forwards;
      }

      @keyframes shrink {
        from { transform: scaleX(1); }
        to { transform: scaleX(0); }
      }

      .redirect-text {
        font-size: 0.875rem;
        color: var(--color-slate-400);
        margin-bottom: 2rem;
      }

      .redirect-text span {
        color: var(--color-teal-400);
        font-weight: 600;
      }

      /* Button styles */
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0.875rem 2rem;
        font-size: 0.95rem;
        font-weight: 600;
        color: var(--color-white);
        text-decoration: none;
        background: linear-gradient(90deg, var(--color-sky-500), var(--color-teal-400));
        border-radius: 12px;
        border: none;
        cursor: pointer;
        box-shadow: 0 10px 20px -10px rgba(14, 165, 233, 0.4);
        transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
        width: 100%;
      }

      .btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 15px 25px -10px rgba(14, 165, 233, 0.6);
        filter: brightness(1.05);
      }

      .btn:active {
        transform: translateY(0);
      }

      .btn-arrow {
        margin-left: 8px;
        transition: transform 0.2s ease;
      }

      .btn:hover .btn-arrow {
        transform: translateX(4px);
      }
    </style>
  </head>
  <body>
    <!-- Glow effects -->
    <div class="glow-blob glow-blob-1"></div>
    <div class="glow-blob glow-blob-2"></div>

    <div class="card">
      <div class="icon-container">
        <!-- Terminal SVG Icon -->
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="4 17 10 11 4 5"></polyline>
          <line x1="12" y1="19" x2="20" y2="19"></line>
        </svg>
      </div>

      <div class="error-code">404</div>
      <h1>Page Not Found</h1>
      <p>The page you are looking for doesn't exist, has been moved, or is temporarily unavailable.</p>

      <div class="progress-container">
        <div class="progress-bar"></div>
      </div>
      <div class="redirect-text">
        Redirecting to homepage in <span id="countdown">5</span> seconds...
      </div>

      <button id="home-btn" class="btn">
        Return to Homepage
        <svg class="btn-arrow" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="5" y1="12" x2="19" y2="12"></line>
          <polyline points="12 5 19 12 12 19"></polyline>
        </svg>
      </button>
    </div>

    <script>
      let seconds = 5;
      const countdownEl = document.getElementById('countdown');
      const homeBtn = document.getElementById('home-btn');
      
      // Determine base URL dynamically depending on where the app is hosted.
      // If hosted on GitHub Pages: hoangan-bonieeror.github.io/portfolio/
      const repoName = "/portfolio";
      const path = window.location.pathname;
      
      // Fallback redirect URL to current origin + repo subpath if hosted on GitHub Pages
      let redirectUrl = window.location.origin + repoName + "/";
      if (!path.startsWith(repoName)) {
        redirectUrl = window.location.origin + "/";
      }

      // Handle button click for instant redirection
      homeBtn.addEventListener('click', (e) => {
        e.preventDefault();
        window.location.href = redirectUrl;
      });

      // Automatically update the countdown and redirect
      const interval = setInterval(() => {
        seconds--;
        if (countdownEl) {
          countdownEl.textContent = seconds;
        }
        if (seconds <= 0) {
          clearInterval(interval);
          window.location.href = redirectUrl;
        }
      }, 1000);
    </script>
  </body>
</html>
