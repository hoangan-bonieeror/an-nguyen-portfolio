        const pathname = window.location.pathname;
        const repoName = "/an-nguyen-portfolio";
        
        // Define valid entry routes
        const isValidPath = 
          pathname === '/' || 
          pathname === '/index.html' || 
          pathname === repoName || 
          pathname === repoName + '/' || 
          pathname === repoName + '/index.html';
        
        // Exclude asset file requests and internal Vite dev server paths
        const isAssetOrDev = 
          pathname.includes('.') || 
          pathname.startsWith('/src/') || 
          pathname.startsWith('/@') || 
          pathname.startsWith('/node_modules/');

        if (!isValidPath && !isAssetOrDev) {
          const redirectPath = pathname.startsWith(repoName) ? (repoName + '/404.html') : '/404.html';
          window.location.href = redirectPath;
        }
      })();
